<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>Editar Medicamento</title>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="info">
                    <h1>Editar Medicamento</h1>
                    <form th:action="@{/medicine/save}" method="POST" th:object="${medicine}">

                        <input type="hidden" th:field="*{id}"/>

                        <div class="form-group">
                            <label for="name" class="form-label">Nome:</label>
                            <input type="text" id="name" name="name" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="form-group">
                            <label for="dosage" class="form-label">Dosagem:</label>
                            <input type="text" id="dosage" name="dosage" class="form-control" th:field="*{dosage}" required>
                        </div>
                        <div class="form-group">
                            <label for="format" class="form-label">Formato:</label>
                            <input type="text" id="format" name="format" class="form-control" th:field="*{format}" required>
                        </div>
                        <div class="form-group">
                            <label for="note" class="form-label">Observação:</label>
                            <textarea id="note" name="note" class="form-control" rows="5" th:field="*{note}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Editar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
