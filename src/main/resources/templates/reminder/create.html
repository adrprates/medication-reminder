<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <title>Cadastrar Lembrete</title>
    <style>
        .weekdays-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .weekdays-selector input[type="checkbox"] {
            display: none;
        }

        .weekdays-selector label {
            padding: 8px 14px;
            border-radius: 6px;
            border: 2px solid #666;
            cursor: pointer;
            background-color: #f9f9f9;
            transition: all 0.3s;
        }

        .weekdays-selector input[type="checkbox"]:checked + label {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="info">
                    <h1>Cadastrar Lembrete</h1>
                    <form th:action="@{/reminder/save}" method="POST" th:object="${reminder}">
                        <div class="form-group">
                            <label for="title" class="form-label">Título:</label>
                            <input type="text" id="title" name="title" class="form-control" th:field="*{title}" required>
                        </div>
                        <div class="form-group">
                            <label for="hour" class="form-label">Horário:</label>
                            <input type="time" id="hour" name="hour" class="form-control" th:field="*{hour}" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Dias da Semana:</label>
                            <div class="weekdays-selector">
                                <input type="checkbox" id="sunday" name="weekDays" value="SUNDAY">
                                <label for="sunday">Dom</label>

                                <input type="checkbox" id="monday" name="weekDays" value="MONDAY">
                                <label for="monday">Seg</label>

                                <input type="checkbox" id="tuesday" name="weekDays" value="TUESDAY">
                                <label for="tuesday">Ter</label>

                                <input type="checkbox" id="wednesday" name="weekDays" value="WEDNESDAY">
                                <label for="wednesday">Qua</label>

                                <input type="checkbox" id="thursday" name="weekDays" value="THURSDAY">
                                <label for="thursday">Qui</label>

                                <input type="checkbox" id="friday" name="weekDays" value="FRIDAY">
                                <label for="friday">Sex</label>

                                <input type="checkbox" id="saturday" name="weekDays" value="SATURDAY">
                                <label for="saturday">Sáb</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="note" class="form-label">Observação:</label>
                            <textarea id="note" name="note" class="form-control" rows="4" th:field="*{note}"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="medicineIds" class="form-label">Remédios:</label>
                            <select id="medicineIds" name="medicineIds" multiple class="form-control">
                                <option th:each="med : ${medicines}"
                                        th:value="${med.id}"
                                        th:text="${med.name}">
                                    Remédio
                                </option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Cadastrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
  $(document).ready(function() {
    $('#medicineIds').select2({
      placeholder: "Selecione os remédios",
      allowClear: true
    });
  });
</script>
</html>
